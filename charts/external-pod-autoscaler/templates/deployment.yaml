apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "epa.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "epa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "epa.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "epa.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "epa.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ include "epa.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.controller.workingDir }}
          workingDir: {{ .Values.controller.workingDir }}
          {{- end }}
          command:
            {{- toYaml .Values.controller.command | nindent 12 }}
          ports:
            - containerPort: 8443
              name: webhook
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.controller.logLevel }}
            - name: ENABLE_WEBHOOKS
              value: {{ .Values.controller.enableWebhooks | quote }}
            - name: SCRAPER_WORKERS
              value: {{ .Values.controller.scraperWorkers | quote }}
            - name: SERVICE_NAME
              value: {{ include "epa.fullname" . }}-webhook
            - name: SERVICE_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: CERT_NAME
              value: {{ include "epa.fullname" . }}-webhook-cert
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          {{- with .Values.controller.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.controller.enableWebhooks }}
            - name: tls
              mountPath: /etc/webhook/tls
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.controller.enableWebhooks }}
        - name: tls
          secret:
            secretName: {{ include "epa.fullname" . }}-webhook-cert
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
