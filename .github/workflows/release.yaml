name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets

  docker:
    name: Docker
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ctxsh/external-pod-autoscaler:${{ github.ref_name }}
            ctxsh/external-pod-autoscaler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Helm Chart
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p .helm-packages
          helm package charts/external-pod-autoscaler -d .helm-packages

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repo index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          helm repo index gh-pages --url https://ctxswitch.github.io/external-pod-autoscaler --merge gh-pages/index.yaml

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "release chart ${{ github.ref_name }}"
          git push

  release:
    name: GitHub Release
    needs: [docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$prev_tag" ]; then
            log=$(git log --pretty=format:"- %s (%h)" ${{ github.ref_name }})
          else
            log=$(git log --pretty=format:"- %s (%h)" "${prev_tag}..${{ github.ref_name }}")
          fi

          {
            echo "changelog<<EOF"
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## Docker Image

            ```
            docker pull ctxsh/external-pod-autoscaler:${{ github.ref_name }}
            ```

            ## Helm Chart

            ```bash
            helm repo add epa https://ctxswitch.github.io/external-pod-autoscaler
            helm repo update
            helm install epa epa/external-pod-autoscaler
            ```

            ## Changelog

            ${{ steps.changelog.outputs.changelog }}
